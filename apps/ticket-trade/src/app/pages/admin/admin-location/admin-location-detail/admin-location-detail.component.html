<div class="row">
    <div class="col-12 mt-3">
        <h1>{{ location?.name }}</h1>
        <div class="col-12 d-flex mt-4">
            <i class="fa-solid fa-street-view detail-icon"></i>
            <p class="my-auto">
                <span class="bold-text">Oppervlakte:</span> {{ location?.surface }} m2
            </p>
        </div>
        <div class="col-12 d-flex mt-4">
            <i class="fa-solid fa-map-pin detail-icon"></i>
            <p class="my-auto">
                <span class="bold-text">Locatie:</span> {{ location?.street }} {{ location?.houseNumber }}, {{ location?.postalCode }}, {{ location?.city }}
            </p>
        </div>
        <div class="col-12 d-flex mt-4">
            <i class="fa-solid fa-globe detail-icon"></i>
            <p class="my-auto">
                <span class="bold-text">Land:</span> {{ location?.country }}
            </p>
        </div>
        <div class="col-12 mt-5">
            <div class="row">
                <div class="col-12 mx-auto mb-3 flex-xl-row flex-column d-flex justify-content-between">
                    <a routerLink=".." class="btn primary-btn secondary-btn mt-3"><i class="fa-solid fa-chevron-left"></i> Sluiten</a>
                </div>
            </div>
        </div>
    </div>
</div>
