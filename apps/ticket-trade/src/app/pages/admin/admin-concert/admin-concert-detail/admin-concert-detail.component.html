<div class="row">
    <div class="col-12">
        <img class="img-fluid rounded mb-5 mb-lg-0" src="assets/img/Concert-detail.jpg" alt="concert-img" />
    </div>
    <div class="col-12 mt-3">
        <h1>{{ concert?.name }}</h1>
        <p>{{ concert?.description }}</p>
        <div class="col-12 d-flex mt-4">
            <i class="fa-solid fa-calendar-days detail-icon"></i>
            <p class="my-auto">
                <span class="bold-text">Datum:</span> {{ concert?.startDateTime | date: 'short' }}
            </p>
        </div>
        <div class="col-12 d-flex mt-4">
            <i class="fa-solid fa-location-dot detail-icon"></i>
            <p class="my-auto">
                <span class="bold-text">Locatie:</span> {{ concert?.location?.street }} {{ concert?.location?.houseNumber }}, {{ concert?.location?.postalCode }}, {{ concert?.location?.city }}
            </p>
        </div>
        <div class="col-12 d-flex mt-4">
            <i class="fa-solid fa-euro-sign detail-icon"></i>
            <p class="my-auto">
                <span class="bold-text">Prijs:</span> {{ concert?.price }}
            </p>
        </div>
        <div class="col-12 mt-5">
            <div class="row">
                <div class="col-12 mx-auto mb-3 flex-xl-row flex-column d-flex justify-content-between">
                    <a routerLink=".." class="btn primary-btn secondary-btn mt-3"><i class="fa-solid fa-chevron-left"></i> Ga terug</a
            >
            <button class="btn primary-btn mt-3" type="submit">
              Tickets <i class="fa-solid fa-chevron-right"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
