<main>
    <div class="container">
        <div class="row">
            <div class="col-12">
                <a routerLink="/concerten" class="btn primary-btn secondary-btn mt-5"><i class="fa-solid fa-chevron-left"></i> Ga terug</a>
            </div>
            <div class="col-12 grey-bg p-5 my-5 boxing-shadow">
                <div class="row">
                    <div class="col-12 col-lg-6">
                        <h1>{{ concert?.name }}</h1>
                        <p>{{ concert?.description }}</p>
                        <div class="col-12 d-flex mt-4">
                            <i class="fa-solid fa-calendar-days concert-icon"></i>
                            <p class="my-auto"><span class="bold-text">Datum:</span> {{ concert?.startDateTime | date:'short' }}</p>
                        </div>
                        <div class="col-12 d-flex mt-4">
                            <i class="fa-solid fa-location-dot concert-icon"></i>
                            <p class="my-auto"><span class="bold-text">Locatie:</span> {{ concert?.location }}</p>
                        </div>
                        <div class="col-12 d-flex mt-4">
                            <i class="fa-solid fa-euro-sign concert-icon"></i>
                            <p class="my-auto"><span class="bold-text">Prijs:</span> {{ concert?.price }}</p>
                        </div>
                        <div class="col-12 mt-5">
                            <div class="row">
                                <div class="col-12">
                                    <a class="btn primary-btn d-block d-lg-inline">Tickets <i class="fa-solid fa-chevron-right"></i></a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-lg-6 d-none d-lg-inline">
                        <div class="row">
                            <div class="col-12">
                                <img class="img-fluid rounded mb-5 mb-lg-0" src="assets/img/Concert-detail.jpg" alt="box-img">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
